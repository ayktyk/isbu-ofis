services:
  postgres:
    image: postgres:16-alpine
    container_name: hukuk-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hukuk_takip
    ports:
      - "5432:5432"
    volumes:
      - hukuk_pg_data:/var/lib/postgresql/data

volumes:
  hukuk_pg_data:

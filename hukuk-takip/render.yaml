services:
  - type: web
    name: isbu-ofis-api
    runtime: node
    plan: free
    rootDir: hukuk-takip
    buildCommand: npm install --include=dev && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: npm run start --workspace=server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Cron Render Free'de garantili değil (uykuya dalar). Asıl mekanizma
      # on-demand scan (notifications + dashboard endpoint'lerinde). Cron açık
      # kalır ki servis uyanıkken ek sigorta olsun.
      - key: ENABLE_SCHEDULED_JOBS
        value: "true"

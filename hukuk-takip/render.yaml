services:
  - type: web
    name: isbu-ofis-api
    runtime: node
    plan: free
    rootDir: hukuk-takip
    buildCommand: npm install && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: npm run start --workspace=server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_SCHEDULED_JOBS
        value: "false"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3355"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="50%" stop-color="#d4a94c"/>
      <stop offset="100%" stop-color="#b8841a"/>
    </linearGradient>
    <linearGradient id="goldBright" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5e08a"/>
      <stop offset="100%" stop-color="#c9952e"/>
    </linearGradient>
    <linearGradient id="shield" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2240"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path d="M100,80 L412,80 Q432,80 432,100 L432,320 Q432,420 256,460 Q80,420 80,320 L80,100 Q80,80 100,80 Z"
        fill="url(#shield)" stroke="url(#gold)" stroke-width="4" opacity="0.9"/>

  <!-- Inner shield highlight -->
  <path d="M116,96 L396,96 Q412,96 412,112 L412,310 Q412,400 256,436 Q100,400 100,310 L100,112 Q100,96 116,96 Z"
        fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>

  <!-- Scale centered in shield -->
  <g transform="translate(256, 260)">
    <!-- Pillar with detail -->
    <rect x="-7" y="-80" width="14" height="170" rx="4" fill="url(#gold)"/>
    <!-- Pillar decoration lines -->
    <line x1="-3" y1="-60" x2="-3" y2="70" stroke="url(#goldBright)" stroke-width="1" opacity="0.4"/>
    <line x1="3" y1="-60" x2="3" y2="70" stroke="url(#goldBright)" stroke-width="1" opacity="0.4"/>

    <!-- Top sphere -->
    <circle cx="0" cy="-88" r="14" fill="url(#goldBright)"/>
    <circle cx="-4" cy="-92" r="4" fill="#f5e08a" opacity="0.5"/>

    <!-- Beam with subtle curve -->
    <path d="M-130,-72 Q0,-78 130,-72" fill="none" stroke="url(#gold)" stroke-width="9" stroke-linecap="round"/>

    <!-- Left assembly -->
    <!-- Chains -->
    <line x1="-120" y1="-68" x2="-140" y2="10" stroke="url(#goldBright)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-120" y1="-68" x2="-100" y2="10" stroke="url(#goldBright)" stroke-width="3" stroke-linecap="round"/>
    <!-- Plate -->
    <ellipse cx="-120" cy="16" rx="46" ry="12" fill="url(#gold)" opacity="0.25"/>
    <ellipse cx="-120" cy="14" rx="46" ry="11" fill="none" stroke="url(#gold)" stroke-width="4"/>

    <!-- Right assembly -->
    <line x1="120" y1="-68" x2="140" y2="10" stroke="url(#goldBright)" stroke-width="3" stroke-linecap="round"/>
    <line x1="120" y1="-68" x2="100" y2="10" stroke="url(#goldBright)" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="120" cy="16" rx="46" ry="12" fill="url(#gold)" opacity="0.25"/>
    <ellipse cx="120" cy="14" rx="46" ry="11" fill="none" stroke="url(#gold)" stroke-width="4"/>

    <!-- Base -->
    <path d="M-7,90 L-40,104 L40,104 L7,90 Z" fill="url(#goldBright)" opacity="0.7"/>
    <rect x="-46" y="102" width="92" height="10" rx="5" fill="url(#gold)"/>
  </g>

  <!-- Sparkle top-right -->
  <g transform="translate(390,120)" fill="#f5e08a" opacity="0.8">
    <path d="M0,-12 L2,-2 L12,0 L2,2 L0,12 L-2,2 L-12,0 L-2,-2 Z"/>
  </g>
  <g transform="translate(370,100)" fill="#f5e08a" opacity="0.4">
    <path d="M0,-6 L1,-1 L6,0 L1,1 L0,6 L-1,1 L-6,0 L-1,-1 Z"/>
  </g>
</svg>

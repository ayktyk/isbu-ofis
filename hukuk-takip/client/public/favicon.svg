<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1f33"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a94c"/>
      <stop offset="50%" stop-color="#c9952e"/>
      <stop offset="100%" stop-color="#b8841a"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#c9952e"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#d4a94c" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="8" y="8" width="496" height="496" rx="88" ry="88" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.25"/>

  <!-- Scale/Balance - centered and larger -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Center pillar -->
    <rect x="-5" y="-20" width="10" height="120" rx="5" fill="url(#gold)"/>

    <!-- Fulcrum diamond -->
    <polygon points="0,-36 16,-20 0,-4 -16,-20" fill="url(#goldLight)"/>

    <!-- Beam -->
    <rect x="-120" y="-24" width="240" height="7" rx="3.5" fill="url(#gold)"/>

    <!-- Left chain -->
    <line x1="-106" y1="-17" x2="-106" y2="36" stroke="url(#goldLight)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Left pan (bowl shape) -->
    <path d="M-140,36 C-140,36 -130,60 -106,64 C-82,60 -72,36 -72,36" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right chain -->
    <line x1="106" y1="-17" x2="106" y2="36" stroke="url(#goldLight)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Right pan (bowl shape) -->
    <path d="M72,36 C72,36 82,60 106,64 C130,60 140,36 140,36" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Base pedestal -->
    <rect x="-36" y="96" width="72" height="8" rx="4" fill="url(#gold)"/>
    <!-- Base stem flare -->
    <path d="M-5,100 L-24,96 L24,96 L5,100 Z" fill="url(#goldLight)" opacity="0.6"/>
  </g>

  <!-- Subtle gold glow ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.15" filter="url(#glow)"/>
</svg>
